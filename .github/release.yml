changelog:
  exclude:
    authors:
      - octocat
    labels:
      - ignore-for-release
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🧰 Maintenance"
      labels:
        - dependencies
        - chore
        - documentation
